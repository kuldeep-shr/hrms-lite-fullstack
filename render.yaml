services:
  - type: web
    name: hrms-lite-api
    runtime: python
    plan: free
    rootDir: backend
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: CORS_ORIGINS
        value: '["https://your-vercel-app.vercel.app"]'

databases:
  - name: hrms-lite-db
    plan: free
